# Dev-Crew Configuration
# Generated by: dev-crew init

project:
  name: my-project
  # stack: nestjs
  # database: postgresql
  # orm: prisma
  # test_framework: vitest

settings:
  max_tokens_per_request: 8000
  show_token_usage: true
  auto_include_schema: true
  default_review_depth: normal    # quick | normal | deep
  confirm_before_apply: true
  output_format: pretty           # pretty | json | markdown

agents:
  review:
    severity: normal              # relaxed | normal | strict
    rules: []
    ignore:
      - "**/*.spec.ts"
      - "**/*.test.ts"
      - "src/generated/**"
    focus:
      - security
      - performance
      - error-handling

  test:
    coverage_target: 80
    patterns:
      - "describe → it → expect"
      - "AAA pattern (Arrange, Act, Assert)"

feedback: {}
