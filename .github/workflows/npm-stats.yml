name: Daily npm Stats

on:
  schedule:
    - cron: '0 9 * * *' # Every day at 9 AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  check-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch npm download stats
        id: stats
        run: |
          LAST_DAY=$(curl -s https://api.npmjs.org/downloads/point/last-day/dev-crew | jq '.downloads')
          LAST_WEEK=$(curl -s https://api.npmjs.org/downloads/point/last-week/dev-crew | jq '.downloads')
          LAST_MONTH=$(curl -s https://api.npmjs.org/downloads/point/last-month/dev-crew | jq '.downloads')
          echo "daily=$LAST_DAY" >> $GITHUB_OUTPUT
          echo "weekly=$LAST_WEEK" >> $GITHUB_OUTPUT
          echo "monthly=$LAST_MONTH" >> $GITHUB_OUTPUT
          echo "## Dev-Crew npm Stats" >> $GITHUB_STEP_SUMMARY
          echo "| Period | Downloads |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Yesterday | $LAST_DAY |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 7 days | $LAST_WEEK |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 30 days | $LAST_MONTH |" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if milestone hit
        if: steps.stats.outputs.weekly > 100
        uses: actions/github-script@v7
        with:
          script: |
            const weekly = ${{ steps.stats.outputs.weekly }};
            const monthly = ${{ steps.stats.outputs.monthly }};
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `npm milestone: ${weekly} downloads this week!`,
              body: `## Download Stats\n- Weekly: ${weekly}\n- Monthly: ${monthly}\n\nKeep it up!`,
              labels: ['stats']
            });
