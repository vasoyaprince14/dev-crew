name: Daily npm Stats

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch npm download stats
        id: stats
        run: |
          LAST_DAY=$(curl -sf https://api.npmjs.org/downloads/point/last-day/dev-crew | jq '.downloads // 0')
          LAST_WEEK=$(curl -sf https://api.npmjs.org/downloads/point/last-week/dev-crew | jq '.downloads // 0')
          LAST_MONTH=$(curl -sf https://api.npmjs.org/downloads/point/last-month/dev-crew | jq '.downloads // 0')
          LAST_DAY=${LAST_DAY:-0}
          LAST_WEEK=${LAST_WEEK:-0}
          LAST_MONTH=${LAST_MONTH:-0}
          echo "daily=$LAST_DAY" >> $GITHUB_OUTPUT
          echo "weekly=$LAST_WEEK" >> $GITHUB_OUTPUT
          echo "monthly=$LAST_MONTH" >> $GITHUB_OUTPUT
          echo "## Dev-Crew npm Stats" >> $GITHUB_STEP_SUMMARY
          echo "| Period | Downloads |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Yesterday | $LAST_DAY |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 7 days | $LAST_WEEK |" >> $GITHUB_STEP_SUMMARY
          echo "| Last 30 days | $LAST_MONTH |" >> $GITHUB_STEP_SUMMARY
